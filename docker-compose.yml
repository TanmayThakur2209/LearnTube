services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: learnTube-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: learnTube
      POSTGRES_PASSWORD: learnTubepassword
      POSTGRES_DB: learnTube

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: learnTube-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: